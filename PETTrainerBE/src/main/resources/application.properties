spring.application.name=PETTrainerBE
spring.datasource.url=${DB_URL:jdbc:mysql://reseau.proxy.rlwy.net:28443/pet_sida_db?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jackson.property-naming-strategy=SNAKE_CASE

# Load local secrets file if present (gitignored)
spring.config.import=optional:classpath:application-local.properties

# JWT
jwt.secret.key=${JWT_SECRET_KEY}

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID}

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:}
